name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # roz ek baar chalega
  workflow_dispatch:        # manually bhi chala sakti ho

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23bb9af7&color_dots=%231a1b27,%233d59a1,%234f6ba8,%236a8fd8,%237aa2f7

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
